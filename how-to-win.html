    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <section>
      <main>
        <div class="main_div">
          <div class="header">
            <img src="assets/robux/back.webp" alt="Back" class="back-button" id="backButton" />
            <h1 class="home-title">How To win</h1>
          </div>

          <div class="howto-container">
            <!-- Card 1 -->
            <div class="how-to-card">
              <img src="assets/robux/user_register.webp" class="howto-icon" alt="Register" />
              <h3>User Register</h3>
              <p>Register now to enjoy secure, fast, and personalized app experience</p>
            </div>

            <!-- Card 2 (Highlighted) -->
            <div class="how-to-card">
              <img src="assets/robux/redeem.webp" class="howto-icon" alt="Redeem" />
              <h3>User First Redeem</h3>
              <p>Claim your first reward now with a successful redeem code</p>
            </div>

            <!-- Card 3 -->
            <div class="how-to-card">
              <img src="assets/robux/reward.webp" class="howto-icon" alt="Reward" />
              <h3>Get Reward</h3>
              <p>Unlock exciting bonuses and get reward for every successful action</p>
            </div>

            <div class="gadsbanner">
              <ins
                class="adsbygoogle"
                style="display: block"
                data-ad-client="ca-pub-4788685016218460"
                data-ad-slot="9147865924"
                data-ad-format="auto"
                data-full-width-responsive="true"
              ></ins>

    <script>
      document.getElementById("backButton").addEventListener("click", function () {
        window.location.href = "index.html";
      });
    </script>

    <script>
      window.adsbygoogle = window.adsbygoogle || [];

      const adBreak = (adConfig = function (o) {
        adsbygoogle.push(o);
      });

      adConfig({
        preloadAdBreaks: "on",
        onReady: () => {
          window.adReady = true;
          (adsbygoogle = window.adsbygoogle || []).push({});
        },
      });

      function playGameWithAd(callback) {
        adBreak({
          type: "next",
          name: "game_started",
          adBreakDone: function () {
            if (typeof callback === "function") callback();
          },
        });
      }

      document.addEventListener("DOMContentLoaded", function () {
        document.body.addEventListener("click", function (event) {
          if (event.target.closest(".bottom-nav")) return;
          const link = event.target.closest("a");
          if (link && link.getAttribute("href")) {
            const url = link.getAttribute("href");

            // allow special cases (like #, javascript:, mailto:, tel:) to work normally
            if (
              url.startsWith("#") ||
              url.startsWith("javascript:") ||
              url.startsWith("mailto:") ||
              url.startsWith("tel:")
            ) {
              return;
            }
            event.preventDefault();

            playGameWithAd(function () {
              window.location.href = url;
            });
          }
        });
      });
    </script>
