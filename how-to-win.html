<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>How to win</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&amp;display=swap"
        rel="stylesheet" />

    <link rel="preconnect" href="https://pagead2.googlesyndication.com/" />
    <link rel="preconnect" href="https://googleads.g.doubleclick.net/" />

    <script
      async
      data-ad-frequency-hint="30s"
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4788685016218460"
      crossorigin="anonymous"
    ></script>
</head>

<body>
    <section>
        <main>
            <div class="main_div">
                <div class="header">
                    <img src="assets/robux/back.webp" alt="Back" class="back-button" id="backButton" />
                    <h1 class="home-title">How To win</h1>
                </div>

                <div class="howto-container">
                    <!-- Card 1 -->
                    <div class="how-to-card">
                        <img src="assets/robux/user_register.webp" class="howto-icon" alt="Register" />
                        <h3>User Register</h3>
                        <p>
                            Register now to enjoy secure, fast, and personalized app
                            experience
                        </p>
                    </div>

                    <!-- Card 2 (Highlighted) -->
                    <div class="how-to-card">
                        <img src="assets/robux/redeem.webp" class="howto-icon" alt="Redeem" />
                        <h3>User First Redeem</h3>
                        <p>Claim your first reward now with a successful redeem code</p>
                    </div>

                    <!-- Card 3 -->
                    <div class="how-to-card">
                        <img src="assets/robux/reward.webp" class="howto-icon" alt="Reward" />
                        <h3>Get Reward</h3>
                        <p>
                            Unlock exciting bonuses and get reward for every successful
                            action
                        </p>
                    </div>

                    <div class="gadsbanner">
                        <ins class="adsbygoogle" style="display: block" data-ad-client="ca-pub-4788685016218460"
                            data-ad-slot="8597806557" data-ad-format="auto" data-full-width-responsive="true"></ins>
                        <label style="
                  display: block;
                  margin: 0px auto;
                  width: fit-content;
                  letter-spacing: 4px;
                  color: rgb(65, 77, 101);
                  font:
                    400 9px / 2 Arial,
                    sans-serif;
                  opacity: 0.7;
                ">ADVERTISEMENT</label>
                        <script>
                            (adsbygoogle = window.adsbygoogle || []).push({});
                        </script>
                    </div>
                </div>
            </div>
        </main>
    </section>

    <script>
        document
            .getElementById("backButton")
            .addEventListener("click", function () {
                window.history.back();
            });
    </script>

    <script>
        window.adsbygoogle = window.adsbygoogle || [];
        
        const adBreak = adConfig = function (o) {
            adsbygoogle.push(o);
        };

        adConfig({
            preloadAdBreaks: "on",
            onReady: () => {
                console.log("✅ AdSense API Ready");
            }
        });

        function playGameWithAd(callback) {
            adBreak({
                type: 'preroll',
                name: 'game_started',
                adBreakDone: function (placementInfo) {
                    if (typeof callback === "function") callback();
                }
            });
        }

        document.addEventListener("DOMContentLoaded", function () {
            document.body.addEventListener("click", function (event) {
                const link = event.target.closest("a"); 
                if (link && link.getAttribute("href")) {
                    const url = link.getAttribute("href");

                    // allow special cases (like #, javascript:, mailto:, tel:) to work normally
                    if (
                        url.startsWith("#") ||
                        url.startsWith("javascript:") ||
                        url.startsWith("mailto:") ||
                        url.startsWith("tel:")
                    ) {
                        return;
                    }
                    event.preventDefault();

                    playGameWithAd(function () {
                        window.location.href = url;
                    });
                }
            });
        });
    </script>

</html>
