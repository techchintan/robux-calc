<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Dollar to RBX Calculator</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="stylesheet" href="css/style.css" />

    <link rel="preconnect" href="https://pagead2.googlesyndication.com/" />
    <link rel="preconnect" href="https://googleads.g.doubleclick.net/" />

    <script
      async
      data-ad-frequency-hint="30s"
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4788685016218460"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <section>
      <main>
        <div class="main_div">
          <div class="fff_game_section">
            <div class="header">
              <img
                src="assets/robux/back.webp"
                alt="Back"
                class="back-button"
                id="backButton"
              />
              <h1 class="home-title">Dollar to RBX Calculator</h1>
            </div>

            <div class="game_section" style="height: auto">
              <div>
                <img
                  src="assets/robux/all_calimage.webp"
                  class="rbximage"
                  loading="eager"
                  alt="RBX Calculator"
                />
              </div>
              <div
                style="
                  display: flex;
                  flex-direction: column;
                  gap: 8px;
                  justify-content: flex-start;
                "
              >
                <p style="text-align: left; color: #ffffff">
                  Enter Dollar Amount..
                </p>
                <div class="input-wrapper">
                  <input
                    type="number"
                    class="input-field"
                    id="playerNameInput"
                    placeholder="Enter Dollar Amount"
                    min="1"
                  />
                </div>
                <button class="continue-btn" id="continueBtn">Count Now</button>
              </div>
            </div>

            <div id="rbxbuilder" style="display: none">
              <div class="gradient-box">
                <div
                  style="
                    display: flex;
                    justify-content: center;
                    align-items: center;
                  "
                >
                  <img
                    src="assets/robux/win.png"
                    height="90px"
                    width="90px"
                    loading="eager"
                    alt="Win"
                  />
                </div>
                <div
                  style="
                    display: flex;
                    flex-direction: column;
                    text-align: left;
                  "
                >
                  Getting this much of Dollars will cost :
                  <div id="result" class="rbxresult"></div>
                </div>
              </div>
            </div>

            <div class="gadsbanner">
              <ins
                class="adsbygoogle"
                style="display: block"
                data-ad-client="ca-pub-4788685016218460"
                data-ad-slot="8597806557"
                data-ad-format="auto"
                data-full-width-responsive="true"
              ></ins>
              <label
                style="
                  display: block;
                  margin: 0px auto;
                  width: fit-content;
                  letter-spacing: 4px;
                  color: rgb(65, 77, 101);
                  font:
                    400 9px / 2 Arial,
                    sans-serif;
                  opacity: 0.7;
                "
                >ADVERTISEMENT</label
              >
              <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
              </script>
            </div>
          </div>
        </div>
      </main>
    </section>

    <script>
      document
        .getElementById("backButton")
        .addEventListener("click", function () {
          window.history.back();
        });

      document
        .getElementById("continueBtn")
        .addEventListener("click", function () {
          const rbx = parseInt(
            document.getElementById("playerNameInput").value,
            10,
          );

          if (!isNaN(rbx) && rbx > 0) {
            // Conversion: 1 RBX = $0.0125
            const total = rbx * 80;

            // Show result
            document.getElementById("result").innerText =
              total.toFixed(2) + " RBX";
            document.getElementById("rbxbuilder").style.display = "block";
          } else {
            alert("Please enter the dollar amount");
          }
        });
    </script>
    </html>
